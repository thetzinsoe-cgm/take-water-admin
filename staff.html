<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Take Water - Staff</title>
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <div class="app">
    <div class="sidebar-overlay"></div>
    <aside class="sidebar">
      <div class="sidebar-header"><img src="assets/logo.svg" alt="Take Water" class="sidebar-logo"><div class="sidebar-brand"><h3>TAKE WATER</h3><span>PURIFIED DELIVERY</span></div></div>
      <nav class="sidebar-nav">
        <div class="nav-section"><a href="dashboard.html" class="nav-item" data-page="dashboard"><span class="icon">📊</span> Dashboard</a></div>
        <div class="nav-section"><div class="nav-section-title">Management</div>
          <a href="products.html" class="nav-item" data-page="products"><span class="icon">📦</span> Products</a>
          <a href="customers.html" class="nav-item" data-page="customers"><span class="icon">👤</span> Customers</a>
          <a href="orders.html" class="nav-item" data-page="orders"><span class="icon">🛒</span> Orders <span class="badge">3</span></a>
        </div>
        <div class="nav-section"><div class="nav-section-title">Resources</div>
          <a href="staff.html" class="nav-item active" data-page="staff"><span class="icon">👥</span> Staff</a>
          <a href="knowledge.html" class="nav-item" data-page="knowledge"><span class="icon">📖</span> Knowledge</a>
        </div>
        <div class="nav-section"><div class="nav-section-title">Analytics</div>
          <div class="nav-item" onclick="toggleSubmenu(this)"><span class="icon">📈</span> Reports <span class="arrow">▸</span></div>
          <div class="submenu">
            <a href="sale-report.html" class="nav-item" data-page="sale-report"><span class="icon">💰</span> Sale Report</a>
            <a href="customer-report.html" class="nav-item" data-page="customer-report"><span class="icon">👤</span> Customer Report</a>
            <a href="top-selling-report.html" class="nav-item" data-page="top-selling-report"><span class="icon">🏆</span> Top Selling Report</a>
          </div>
        </div>
        <div class="nav-section"><div class="nav-section-title">System</div>
          <a href="settings.html" class="nav-item" data-page="settings"><span class="icon">⚙️</span> Settings</a>
          <a href="index.html" class="nav-item"><span class="icon">🚪</span> Logout</a>
        </div>
      </nav>
    </aside>

    <div class="main-content">
      <header class="header">
        <div class="header-left"><button class="hamburger">☰</button><h1 class="page-title">Staff Management</h1></div>
        <div class="header-right">
          <div class="header-lang"><button class="lang-btn active">MY</button><button class="lang-btn">EN</button></div>
          <div class="header-user"><div class="user-avatar">A</div><div class="user-info"><span class="user-name">Admin 16</span><span class="user-role">Company Admin</span></div></div>
        </div>
      </header>

      <div class="content">
        <div class="toolbar">
          <div class="toolbar-row">
            <div class="form-group"><label class="form-label">Staff Name</label><input type="text" class="form-control" placeholder="Search staff..."></div>
            <div class="form-group"><label class="form-label">Staff Role</label>
              <select class="form-control"><option value="">All Roles</option><option>Super Admin</option><option>Company Admin</option><option>Shop Admin</option><option>Cashier Staff</option></select>
            </div>
            <div class="form-group"><label class="form-label">Shop</label>
              <select class="form-control"><option value="">All Shops</option><option>Main Warehouse</option><option>Mandalay Shop</option><option>Yangon Shop</option></select>
            </div>
          </div>
          <div class="toolbar-actions">
            <button class="btn btn-primary">🔍 Search</button>
            <button class="btn btn-secondary">Clear</button>
            <button class="btn btn-success" onclick="openModal('addStaffModal')">➕ Add Staff</button>
          </div>
        </div>

        <div class="card">
          <div class="card-body" style="padding: 0;">
            <div id="staffTable"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="addStaffModal">
    <div class="modal">
      <div class="modal-header"><h3>Add New Staff</h3><button class="modal-close" onclick="closeModal('addStaffModal')">&times;</button></div>
      <div class="modal-body">
        <div class="form-group"><label class="form-label">Staff Name *</label><input type="text" class="form-control" placeholder="Enter staff name"></div>
        <div class="form-group"><label class="form-label">Staff Role *</label>
          <select class="form-control"><option>Company Admin</option><option>Shop Admin</option><option>Cashier Staff</option></select>
        </div>
        <div class="form-group"><label class="form-label">Shop *</label>
          <select class="form-control"><option>Main Warehouse</option><option>Mandalay Shop</option><option>Yangon Shop</option></select>
        </div>
        <div class="form-group"><label class="form-label">Email</label><input type="email" class="form-control" placeholder="staff@email.com"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('addStaffModal')">Cancel</button>
        <button class="btn btn-primary" onclick="closeModal('addStaffModal')">Save Staff</button>
      </div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      renderTable('staffTable', [
        { key: 'name', label: 'Staff Name', render: (v) => `<div style="display:flex;align-items:center;gap:10px"><div class="user-avatar" style="width:32px;height:32px;font-size:0.75rem">${v.charAt(0)}</div><strong>${v}</strong></div>` },
        { key: 'number', label: 'Staff No.' },
        { key: 'role', label: 'Role', render: (v) => `<span class="badge badge-info">${v}</span>` },
        { key: 'shop', label: 'Shop' },
        { key: 'email', label: 'Email' },
        { key: 'joinDate', label: 'Join Date' },
      ], MOCK_DATA.staff);
    });
  </script>
</body>
</html>
