<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Take Water - Customers</title>
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <div class="app">
    <div class="sidebar-overlay"></div>
    <aside class="sidebar">
      <div class="sidebar-header"><img src="assets/logo.svg" alt="Take Water" class="sidebar-logo"><div class="sidebar-brand"><h3>TAKE WATER</h3><span>PURIFIED DELIVERY</span></div></div>
      <nav class="sidebar-nav">
        <div class="nav-section"><a href="dashboard.html" class="nav-item" data-page="dashboard"><span class="icon">📊</span> Dashboard</a></div>
        <div class="nav-section"><div class="nav-section-title">Management</div>
          <a href="products.html" class="nav-item" data-page="products"><span class="icon">📦</span> Products</a>
          <a href="customers.html" class="nav-item active" data-page="customers"><span class="icon">👤</span> Customers</a>
          <a href="orders.html" class="nav-item" data-page="orders"><span class="icon">🛒</span> Orders <span class="badge">3</span></a>
          <a href="stock.html" class="nav-item" data-page="stock"><span class="icon">📊</span> Stock</a>
        </div>
        <div class="nav-section"><div class="nav-section-title">Resources</div>
          <a href="suppliers.html" class="nav-item" data-page="suppliers"><span class="icon">🚚</span> Suppliers</a>
          <a href="staff.html" class="nav-item" data-page="staff"><span class="icon">👥</span> Staff</a>
          <a href="categories.html" class="nav-item" data-page="categories"><span class="icon">📂</span> Categories</a>
        </div>
        <div class="nav-section"><div class="nav-section-title">Analytics</div><a href="reports.html" class="nav-item" data-page="reports"><span class="icon">📈</span> Reports</a></div>
        <div class="nav-section"><div class="nav-section-title">System</div>
          <a href="settings.html" class="nav-item" data-page="settings"><span class="icon">⚙️</span> Settings</a>
          <a href="index.html" class="nav-item"><span class="icon">🚪</span> Logout</a>
        </div>
      </nav>
    </aside>

    <div class="main-content">
      <header class="header">
        <div class="header-left"><button class="hamburger">☰</button><h1 class="page-title">Customer Management</h1></div>
        <div class="header-right">
          <div class="header-lang"><button class="lang-btn active">MY</button><button class="lang-btn">EN</button></div>
          <div class="header-user"><div class="user-avatar">A</div><div class="user-info"><span class="user-name">Admin 16</span><span class="user-role">Company Admin</span></div></div>
        </div>
      </header>

      <div class="content">
        <div class="toolbar">
          <div class="toolbar-row">
            <div class="form-group"><label class="form-label">Customer Name</label><input type="text" class="form-control" placeholder="Search by name..."></div>
            <div class="form-group"><label class="form-label">Phone Number</label><input type="text" class="form-control" placeholder="Search by phone..."></div>
          </div>
          <div class="toolbar-actions">
            <button class="btn btn-primary">🔍 Search</button>
            <button class="btn btn-secondary">Clear</button>
            <button class="btn btn-success" onclick="openModal('addCustomerModal')">➕ Add Customer</button>
            <button class="btn btn-secondary">📥 Download</button>
          </div>
        </div>

        <div class="card">
          <div class="card-body" style="padding: 0;">
            <div id="customersTable"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Add Customer Modal -->
  <div class="modal-overlay" id="addCustomerModal">
    <div class="modal">
      <div class="modal-header"><h3>Add New Customer</h3><button class="modal-close" onclick="closeModal('addCustomerModal')">&times;</button></div>
      <div class="modal-body">
        <div class="form-group"><label class="form-label">Customer Name *</label><input type="text" class="form-control" placeholder="Enter customer name"></div>
        <div class="form-group"><label class="form-label">Phone Number *</label><input type="tel" class="form-control" placeholder="09XXXXXXXXX"></div>
        <div class="form-group"><label class="form-label">Email</label><input type="email" class="form-control" placeholder="customer@email.com"></div>
        <div class="form-group"><label class="form-label">Address</label><textarea class="form-control" rows="2" placeholder="Enter address"></textarea></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal('addCustomerModal')">Cancel</button>
        <button class="btn btn-primary" onclick="closeModal('addCustomerModal')">Save Customer</button>
      </div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      renderTable('customersTable', [
        { key: 'name', label: 'Customer Name', render: (v) => `<strong>${v}</strong>` },
        { key: 'phone', label: 'Phone' },
        { key: 'email', label: 'Email' },
        { key: 'address', label: 'Address' },
        { key: 'total', label: 'Total Amount', render: (v) => formatCurrency(v) },
        { key: 'paid', label: 'Paid', render: (v) => `<span class="text-success">${formatCurrency(v)}</span>` },
        { key: 'remaining', label: 'Remaining', render: (v) => v > 0 ? `<span class="text-danger">${formatCurrency(v)}</span>` : '<span class="text-success">0</span>' },
      ], MOCK_DATA.customers);
    });
  </script>
</body>
</html>
