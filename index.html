<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Take Water - Admin Login</title>
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <img src="assets/logo.svg" alt="Take Water" class="login-logo">
      <h2>TAKE WATER</h2>
      <p class="subtitle">Admin Panel - Purified Delivery Management</p>

      <form onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label">User ID</label>
          <input type="text" class="form-control" id="userId" placeholder="Enter your user ID" value="bibA016">
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" id="password" placeholder="Enter your password" value="A1234567">
        </div>
        <button type="submit" class="btn btn-primary">Login</button>
      </form>

      <p style="margin-top: 24px; font-size: 0.8rem; color: var(--text-muted);">
        &copy; 2026 TAKE WATER CO., LTD.
      </p>
    </div>
  </div>

  <script>
    function handleLogin(e) {
      e.preventDefault();
      window.location.href = 'dashboard.html';
    }
  </script>
</body>
</html>
